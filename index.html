<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Editor de Ejercicios React</title>
  <script src="https://unpkg.com/@codesandbox/sandpack-react/umd/index.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { Sandpack } from "https://unpkg.com/@codesandbox/sandpack-react/dist/index.mjs";

    const root = document.getElementById("app");
    Sandpack.render(root, {
      template: "react",
      files: {
        "/App.js": {
          code: `export default function App() {
            return <h1>¡Hola, mundo!</h1>;
          }`
        }
      }
    });
  </script>
</body>
</html>
